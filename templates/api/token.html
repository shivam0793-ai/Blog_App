<!DOCTYPE html>
<html>
<head>

<title>API Dashboard</title>

<style>

body{

font-family:Arial;
background:#f5f5f5;
padding:50px;

}

.container{

max-width:800px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px #ccc;

}

.token{

background:#222;
color:#00ff00;
padding:15px;
border-radius:5px;
word-break:break-all;
margin:20px 0;

}

a{

display:block;
margin:10px 0;
text-decoration:none;
color:#0066cc;

}

</style>

</head>

<body>

<div class="container">

<h2>Welcome {{ user.username }}</h2>

<h3>Your API Token</h3>

<div class="token">

{{ token }}

</div>

<h3>Available APIs</h3>

<a href="/api/blogs/">GET Blogs</a>

<a href="/api/category/">GET Categories</a>

<a href="/api/profile/">Profile</a>

<p>

Use this header in Postman

</p>

<pre>

Authorization: Token {{ token }}

</pre>

</div>

</body>

</html>
