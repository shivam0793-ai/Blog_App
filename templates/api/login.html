<!DOCTYPE html>
<html>
<head>
    <title>API Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:#f2f5f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            width:380px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        input{

            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;

        }

        button{

            width:100%;
            padding:12px;
            border:none;
            background:#007bff;
            color:white;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;

        }

        button:hover{

            background:#0056b3;

        }

        .error{

            color:red;
            text-align:center;
            margin-bottom:10px;

        }

    </style>

</head>
<body>

<div class="card">

<h2>API Login</h2>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="POST">

    {% csrf_token %}

    <input type="text"
           name="username"
           placeholder="Username"
           required>

    <input type="password"
           name="password"
           placeholder="Password"
           required>

    <button type="submit">

        Login

    </button>

</form>

</div>

</body>
</html>
